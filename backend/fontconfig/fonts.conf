<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Minimal fontconfig config for the bot's ffmpeg subprocess.

  Some Windows ffmpeg builds (e.g. WinGet's `gyan-dev/ffmpeg`) link
  libfontconfig and refuse to start the drawtext filter unless they can
  read a default config file — even when we pass `fontfile=...` directly
  and never need fontconfig to resolve a font name. Pointing
  FONTCONFIG_FILE at this stub makes that happy without polluting the
  user's system fontconfig (if they even have one).

  We declare the standard Windows font dirs as a courtesy in case any
  filter ever falls back to a name lookup, plus a writable cachedir
  inside the bot's data tree so the stub can ship a non-empty cache
  next time fontconfig wants to write one.
-->
<fontconfig>
  <dir>WINDOWSFONTDIR</dir>
  <dir>/Library/Fonts</dir>
  <dir>~/Library/Fonts</dir>
  <dir>/usr/share/fonts</dir>
  <dir>/usr/local/share/fonts</dir>
  <dir>~/.fonts</dir>
  <cachedir prefix="xdg">fontconfig</cachedir>
  <cachedir>~/.fontconfig</cachedir>
</fontconfig>
